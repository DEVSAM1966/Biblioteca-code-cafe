services:
  mysql:
    image: mysql:8.0
    container_name: biblio_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: picard
      MYSQL_DATABASE: biblio_code_cafe
    ports:
      - "3307:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql

volumes:
  db_data: