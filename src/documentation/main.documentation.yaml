openapi: 3.0.0
info:
  title: Biblioteca Code Café API
  version: 1.0.0
  description: API para la gestión de la biblioteca Code Café

servers:
  - url: http://localhost:3000

paths:
  /users/{name}:
    get:
      summary: Obtener usuario por nombre
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Usuario no encontrado
        '400':
          description: Nombre requerido

  /categories/{id}:
    get:
      summary: Obtener categoría por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Categoría encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '404':
          description: Categoría no encontrada
        '400':
          description: ID de categoría requerido

  /publisher/{id}:
    get:
      summary: Obtener editorial por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Publisher encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Publisher'
        '404':
          description: Publisher no encontrado
        '400':
          description: ID inválido

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        # Agrega otros campos según tu modelo
    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        # Agrega otros campos según tu modelo
    Publisher:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        # otros campos según tu modelo
