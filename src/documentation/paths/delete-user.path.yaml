delete:
  tags:
    - Users
  summary: Delete a user by ID
  description: Deletes a user by its numeric ID. Returns success if the user was deleted. Throws error if the ID is invalid or the user does not exist.
  parameters:
    - name: id
      in: path
      required: true
      description: Numeric ID of the user to delete
      schema:
        type: integer
        minimum: 1
  responses:
    '200':
      description: User successfully deleted
      content:
        application/json:
          schema:
            $ref: "../components/data-response.component.yaml#/DataResponse"
          example:
            data: true
            timestamp: "25/09/2025, 17:41:33"
    '400':
      description: Invalid ID format
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          example:
            error:
              message: "Invalid ID for user"
              code: 400
            timestamp: "25/09/2025, 17:41:33"
    '404':
      description: User not found
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          example:
            error:
              message: "User with ID 123 not found"
              code: 404
            timestamp: "25/09/2025, 17:41:33"
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          example:
            error:
              message: "Failed to delete user"
              code: 500
            timestamp: "25/09/2025, 17:41:33"
