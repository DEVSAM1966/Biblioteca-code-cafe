get:
  tags:
    - Authors
  summary: Get all authors
  responses:
    "200":
      description: List of authors
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../components/data-response.component.yaml#/DataResponse"
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "../components/author.component.yaml#/Author"
    "404":
      description: No authors found
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          example:
            error: There are no records in Authors
            timestamp: "25/09/2025, 17:41:33"
