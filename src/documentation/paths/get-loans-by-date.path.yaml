get:
  tags:
    - Loans
  summary: Get loans by loan date
  parameters:
    - name: date
      in: path
      required: true
      description: Date of the loan in YYYY-MM-DD format
      schema:
        type: string
        format: date
  responses:
    "200":
      description: Loans found for date
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../components/data-response.component.yaml#/DataResponse"
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "../components/loan.component.yaml#/Loan"
    "400":
      description: Invalid date format
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          example:
            error: Invalid date for loan
            timestamp: "2025-10-28T21:54:00Z"
    "404":
      description: No loans found for date
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          example:
            error: No loans found for date 2025-06-01
            timestamp: "2025-10-28T21:54:00Z"
