get:
  tags:
    - Books
  summary: Get all books
  responses:
    "200":
      description: List of books
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../components/data-response.component.yaml#/DataResponse"
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "../components/book-out-dto.component.yaml#/BookOutDTO"
    "404":
      description: No books found
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          example:
            error: There are no records in Books
            timestamp: "2025-10-19T20:55:00Z"
