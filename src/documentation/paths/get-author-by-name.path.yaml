get:
  tags:
    - Authors
  summary: Get author by name
  parameters:
    - name: name
      in: path
      required: true
      schema:
        type: string
  responses:
    "200":
      description: Author
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../components/data-response.component.yaml#/DataResponse"
              - type: object
                properties:
                  data:
                    $ref: "../components/author.component.yaml#/Author"
    "400":
      description: Bad Request - Invalid name parameter
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          examples:
            missingName:
              summary: Name is missing
              value:
                error: Name is missing
                timestamp: "25/09/2025, 17:41:33"
            invalidName:
              summary: Name can only contain characters and spaces
              value:
                error: Name can only contain characters and spaces
                timestamp: "25/09/2025, 17:41:33"
    "404":
      description: Author not found
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          example:
            error: Author with name Marcos not found
            timestamp: "25/09/2025, 17:41:33"
