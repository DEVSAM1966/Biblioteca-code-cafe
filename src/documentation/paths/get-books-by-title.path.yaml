get:
  tags:
    - Books
  summary: Get books by title
  parameters:
    - name: name
      in: path
      required: true
      schema:
        type: string
  responses:
    "200":
      description: List of books matching the title
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../components/data-response.component.yaml#/DataResponse"
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "../components/book-out-dto.component.yaml#/BookOutDTO"
    "400":
      description: Invalid title
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          examples:
            missing:
              summary: Title is missing
              value:
                error: Title is missing
                timestamp: "2025-10-19T21:05:00Z"
            invalid:
              summary: Title contains invalid characters
              value:
                error: Title can only contain characters and spaces
                timestamp: "2025-10-19T21:05:00Z"
            multiple:
              summary: Multiple titles provided
              value:
                error: Multiple names not allowed
                timestamp: "2025-10-19T21:05:00Z"
    "404":
      description: No books found with that title
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          examples:
            notFound:
              summary: Book not found
              value:
                error: "No book found with title: Fundación"
                timestamp: "2025-10-19T21:05:00Z"

