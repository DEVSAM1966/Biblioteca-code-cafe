put:
  tags:
    - Loans
  summary: Update an existing loan by ID
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
      description: ID of the loan to update
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/update-loan-dto.component.yaml#/UpdateLoanDTO"
        examples:
          validUpdate:
            summary: Valid loan update
            value:
              returnDate: "2025-06-20"
              userId: 3
              isbn: "9780000000003"
  responses:
    "200":
      description: Loan successfully updated
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../components/data-response.component.yaml#/DataResponse"
              - type: object
                properties:
                  data:
                    $ref: "../components/loan.component.yaml#/Loan"
    "400":
      description: Bad Request - Invalid input or ID
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          examples:
            invalidId:
              summary: Invalid loan ID
              value:
                error: Invalid ID for loan
                timestamp: "01/11/2025, 21:20:00"
    "404":
      description: Loan not found
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          examples:
            notFound:
              summary: Loan not found
              value:
                error: Loan with id 99 not found
                timestamp: "01/11/2025, 21:20:00"
    "500":
      description: Internal Server Error - Failed to update loan
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          examples:
            updateFailed:
              summary: Loan update failed
              value:
                error: Failed to update loan with id 99
                timestamp: "01/11/2025, 21:20:00"
