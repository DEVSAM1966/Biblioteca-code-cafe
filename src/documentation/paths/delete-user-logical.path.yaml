delete:
  tags:
    - Users
  summary: Logical delete of a user by ID
  description: Performs a logical deletion of a user by setting the `userDrop` field to `true`. The user record remains in the database. Returns success if the user was marked as deleted. Throws error if the ID is invalid or the user does not exist.
  parameters:
    - name: id
      in: path
      required: true
      description: Numeric ID of the user to logically delete
      schema:
        type: integer
        minimum: 1
  responses:
    '200':
      description: User successfully marked as deleted
      content:
        application/json:
          schema:
            $ref: "../components/data-response.component.yaml#/DataResponse"
          example:
            data:
              userId: 123
              userDrop: true
              message: "User successfully marked as deleted."
            timestamp: "02/11/2025, 21:11:00"
    '400':
      description: Invalid ID format
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          example:
            error:
              message: "Invalid ID for user"
              code: 400
            timestamp: "02/11/2025, 21:11:00"
    '404':
      description: User not found
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          example:
            error:
              message: "User with ID 123 not found"
              code: 404
            timestamp: "02/11/2025, 21:11:00"
    '409':
      description: User is already marked as deleted
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          example:
            error:
              message: "User with id 123 is already marked as deleted"
              code: 409
            timestamp: "02/11/2025, 21:11:00"
    '500':
      description: Unexpected internal server error
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          example:
            error:
              message: "Failed to logical delete user"
              code: 500
            timestamp: "02/11/2025, 21:11:00"
