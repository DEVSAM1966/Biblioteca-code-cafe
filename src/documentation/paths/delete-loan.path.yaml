delete:
  tags:
    - Loans
  summary: Delete a loan by ID
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
      description: ID of the loan to delete
  responses:
    "200":
      description: Loan successfully deleted
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../components/data-response.component.yaml#/DataResponse"
              - type: object
                properties:
                  data:
                    type: boolean
                    example: true
    "400":
      description: Bad Request - Invalid ID
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          examples:
            invalidId:
              summary: Invalid loan ID
              value:
                error: Invalid ID for loan
                timestamp: "01/11/2025, 21:20:00"
    "404":
      description: Loan not found
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          examples:
            notFound:
              summary: Loan not found
              value:
                error: Loan with id 99 not found
                timestamp: "01/11/2025, 21:20:00"
    "500":
      description: Internal Server Error - Failed to delete loan
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          examples:
            deletionFailed:
              summary: Loan deletion failed
              value:
                error: Failed to delete loan
                timestamp: "01/11/2025, 21:20:00"
