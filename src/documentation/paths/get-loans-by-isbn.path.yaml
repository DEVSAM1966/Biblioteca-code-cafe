get:
  tags:
    - Loans
  summary: Get loans by ISBN
  parameters:
    - name: id
      in: path
      required: true
      description: ISBN of the book
      schema:
        type: string
        pattern: "^[0-9]+$"
  responses:
    "200":
      description: Loans found for ISBN
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../components/data-response.component.yaml#/DataResponse"
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "../components/loan.component.yaml#/Loan"
    "400":
      description: Invalid ISBN format
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          example:
            error: Isbn for loan can only contain number
            timestamp: "2025-10-28T21:54:00Z"
    "404":
      description: No loans found for ISBN
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          example:
            error: No loans found for ISBN 9780000000001
            timestamp: "2025-10-28T21:54:00Z"
