get:
  tags:
    - Publishers
  summary: Get all publishers
  responses:
    "200":
      description: List of publishers
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../components/data-response.component.yaml#/DataResponse"
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "../components/publisher.component.yaml#/Publisher"
    "404":
      description: No publishers found
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          example:
            error: There are no records in Publishers
            timestamp: "2025-10-02T21:52:56Z"
