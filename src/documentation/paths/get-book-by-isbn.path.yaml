get:
  tags:
    - Books
  summary: Get book by ISBN
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        example: "9780000000001"
  responses:
    "200":
      description: Book found
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../components/data-response.component.yaml#/DataResponse"
              - type: object
                properties:
                  data:
                    $ref: "../components/book-out-dto.component.yaml#/BookOutDTO"
    "400":
      description: Invalid ISBN
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          examples:
            missing:
              summary: ISBN is missing
              value:
                error: ISBN is missing
                timestamp: "2025-10-19T21:15:00Z"
            invalid:
              summary: ISBN contains invalid characters
              value:
                error: ISBN can only contain number
                timestamp: "2025-10-19T21:15:00Z"
    "404":
      description: Book not found
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          examples:
            notFound:
              summary: Book not found
              value:
                error: Book with isbn 9780000000001 not found
                timestamp: "2025-10-19T21:15:00Z"