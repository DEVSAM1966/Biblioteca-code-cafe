post:
  tags:
    - Authors
  summary: Create a new author
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/create-author-dto.component.yaml#/CreateAuthorDto"
        example:
          summary: Valid author creation
          value:
            name: Jhon Doe
  responses:
    "201":
      description: Author successfully created
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../components/data-response.component.yaml#/DataResponse"
              - type: object
                properties:
                  data:
                    $ref: "../components/author-out-dto.component.yaml#/AuthorOutDto"
    "400":
      description: Bad Request - Invalid input data
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          examples:
            missingName:
              summary: Name is required
              value:
                error: name must be a string
                timestamp: "12/10/2025, 00:30:00"
    "500":
      description: Internal Server Error - Failed to create author
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          example:
            summary: Author creation failed
            value:
              error: Failed to create author
              timestamp: "12/10/2025, 00:30:00"
