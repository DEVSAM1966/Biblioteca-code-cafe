Author:
  type: object
  properties:
    author_id:
      type: integer
      example: 1
    name_author:
      type: string
      example: "Isaac Asimov"

AuthorResponse:
  type: object
  properties:
    data:
      $ref: "#/Author"

ErrorResponse:
  type: object
  properties:
    error:
      type: string
      example: Author with id 123 not found
