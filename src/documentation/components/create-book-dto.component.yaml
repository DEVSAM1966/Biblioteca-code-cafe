CreateBookDto:
  type: object
  required:
    - isbn
    - title
    - authorId
    - publisherId
    - categoryId
  properties:
    isbn:
      type: string
      maxLength: 13
      example: "9786420651361"
    title:
      type: string
      maxLength: 55
      example: "La metamorfosis"
    summary:
      type: string
      maxLength: 255
      example: "La transformación de un hombre en un insecto."
    pages:
      type: integer
      example: 48
    editionDate:
      type: string
      format: date
      example: "2016-11-01"
    language:
      type: string
      maxLength: 20
      example: "Español"
    authors:
      type: string
      maxLength: 100
      example: "Franz Kafka"
    authorId:
      type: integer
      example: 11
    publisherId:
      type: integer
      example: 9786
    categoryId:
      type: integer
      example: 5
