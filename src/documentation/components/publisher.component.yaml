components:
  schemas:
    PublisherInput:
      type: object
      required:
        - publisher_id
        - name_publisher
      properties:
        publisher_id:
          type: integer
          example: 1015
        name_publisher:
          type: string
          maxLength: 100
          example: "Editorial didáctica 2"
        address:
          type: string
          maxLength: 100
          example: "Carretera, km 13"
        city:
          type: string
          maxLength: 40
          example: "Barcelona"
        province:
          type: string
          maxLength: 30
          example: "Barcelona"
        postal_code:
          type: string
          maxLength: 20
          example: "86841"
        country:
          type: string
          maxLength: 30
          example: "España"
        phone:
          type: string
          maxLength: 16
          example: "222222222"
        notes:
          type: string
          maxLength: 255
          example: "Especializada en libros de programación para la universidad"

    Publisher:
      type: object
      properties:
        publisher_id:
          type: integer
          example: 1015
        name_publisher:
          type: string
          maxLength: 100
          example: "Editorial didáctica 2"
        address:
          type: string
          maxLength: 100
          example: "Carretera, km 13"
        city:
          type: string
          maxLength: 40
          example: "Barcelona"
        province:
          type: string
          maxLength: 30
          example: "Barcelona"
        postal_code:
          type: string
          maxLength: 20
          example: "86841"
        country:
          type: string
          maxLength: 30
          example: "España"
        phone:
          type: string
          maxLength: 16
          example: "222222222"
        notes:
          type: string
          maxLength: 255
          example: "Especializada en libros de programación para la universidad"

    PublisherResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/PublisherInput"
        timestamp:
          type: string
          example: "05/10/2025, 18:57:07"

    PublishersResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PublisherInput"
        timestamp:
          type: string
          example: "02/10/2025, 21:52:56"
