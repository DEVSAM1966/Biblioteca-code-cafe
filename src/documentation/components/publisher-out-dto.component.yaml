PublisherOutDTO:
  type: object
  properties:
    publisherId:
      type: integer
      example: 1001
    namePublisher:
      type: string
      example: "Nova Editorial"
    address:
      type: string
      example: "Calle Luna 12"
    city:
      type: string
      example: "Madrid"
    province:
      type: string
      example: "Madrid"
    postalCode:
      type: string
      example: "28001"
    country:
      type: string
      example: "España"
    phone:
      type: string
      example: "912345678"
    notes:
      type: string
      example: "Activo"
