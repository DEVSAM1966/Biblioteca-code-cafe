get:
  tags:
    - Loans
  summary: Get loans by user ID
  parameters:
    - name: id
      in: path
      required: true
      description: Numeric ID of the user
      schema:
        type: integer
        minimum: 1
  responses:
    "200":
      description: Loans found for user
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../components/data-response.component.yaml#/DataResponse"
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "../components/loan.component.yaml#/Loan"
    "400":
      description: Invalid user ID format
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          example:
            error: Invalid userId for loan
            timestamp: "2025-10-28T21:54:00Z"
    "404":
      description: No loans found for user
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          example:
            error: No loans found for user with id 2
            timestamp: "2025-10-28T21:54:00Z"
