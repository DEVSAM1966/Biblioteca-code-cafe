get:
  tags:
    - Authors
  summary: Get author by id
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
  responses:
    "200":
      description: Author
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../components/data-response.component.yaml#/DataResponse"
              - type: object
                properties:
                  data:
                    $ref: "../components/author.component.yaml#/Author"
    "400":
      description: Invalid ID
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          example:
            error: Invalid ID
            timestamp: "2025-09-25T17:41:33Z"
    "404":
      description: Author not found
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          example:
            error: Author with id 123 not found
            timestamp: "2025-09-25T17:41:33Z"
