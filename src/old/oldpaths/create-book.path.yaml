post:
  tags:
    - Books
  summary: Create a new book
  description: Adds a new book to the library. Requires a valid ISBN and associated metadata.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/create-book-dto.component.yaml#/CreateBookDto"
        examples:
          validBook:
            summary: Valid book creation
            value:
              isbn: "9786420651361"
              title: "La metamorfosis"
              summary: "La transformación de un hombre en un insecto."
              pages: 48
              editionDate: "2016-11-01"
              language: "Español"
              authors: "Franz Kafka"
              authorId: 11
              publisherId: 9786
              categoryId: 5
  responses:
    "201":
      description: Book successfully created
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../components/data-response.component.yaml#/DataResponse"
              - type: object
                properties:
                  data:
                    $ref: "../components/book-out-dto.component.yaml#/BookOutDTO"
    "400":
      description: Bad Request - Invalid input data
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          examples:
            missingIsbn:
              summary: ISBN is required
              value:
                error: isbn must be a string
                timestamp: "22/10/2025, 19:47:00"
            invalidAuthorId:
              summary: Author ID must be a number
              value:
                error: authorId must be an integer
                timestamp: "22/10/2025, 19:47:00"
    "500":
      description: Internal Server Error - Failed to create book
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          examples:
            creationFailed:
              summary: Book creation failed
              value:
                error: Failed to create book
                timestamp: "22/10/2025, 19:47:00"