put:
  tags:
    - Books
  summary: Update an existing book by ISBN
  description: Updates the metadata of a book. Requires a valid numeric ISBN.
  parameters:
    - name: id
      in: path
      required: true
      description: Numeric ISBN of the book to update
      schema:
        type: string
        pattern: "^[0-9]+$"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/create-book-dto.component.yaml#/CreateBookDto"
        example:
          title: "La metamorfosis revisada"
          summary: "Versión extendida con prólogo adicional."
          pages: 64
          editionDate: "2020-05-15"
          language: "Español"
          authors: "Franz Kafka"
          authorId: 11
          publisherId: 9786
          categoryId: 5
  responses:
    "200":
      description: Book successfully updated
      content:
        application/json:
          schema:
            $ref: "../components/data-response.component.yaml#/DataResponse"
          example:
            success: true
            data:
              isbn: "9786420651361"
              title: "La metamorfosis revisada"
              summary: "Versión extendida con prólogo adicional."
              pages: 64
              editionDate: "2020-05-15T00:00:00.000Z"
              bookCover: "null"
              bookFile: "null"
              language: "Español"
              authorId: 11
              authors: "Franz Kafka"
              publisherId: 9786
              categoryId: 5
    "400":
      description: Invalid ISBN or malformed input
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
    "404":
      description: Book not found
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
    "500":
      description: Internal Server Error - Failed to update book
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"