get:
  tags:
    - Categories
  summary: Get category by name
  parameters:
    - name: name
      in: path
      required: true
      schema:
        type: string
  responses:
    "200":
      description: Category found
      content:
        application/json:
          schema:
            allOf:
              - $ref: "../components/data-response.component.yaml#/DataResponse"
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "../components/category-out-dto.component.yaml#/CategoryOutDTO"
    "400":
      description: Bad Request - Invalid name parameter
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          examples:
            missingName:
              summary: Name is missing
              value:
                error: Name is missing
                timestamp: "30/09/2025, 20:46:04"
            invalidName:
              summary: Name can only contain characters and spaces
              value:
                error: Name can only contain characters and spaces
                timestamp: "30/09/2025, 20:46:04"
    "404":
      description: Category not found
      content:
        application/json:
          schema:
            $ref: "../components/error-response.component.yaml#/ErrorResponse"
          examples:
            notFound:
              summary: Category not found
              value:
                error: No category found with name
                timestamp: "30/09/2025, 20:46:04"
